version = 1
requires-python = ">=3.11"

[[package]]
name = "support-inbox-triage"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
  { name = "fastapi" },
  { name = "openai" },
  { name = "openenv-core" },
  { name = "pydantic" },
  { name = "uvicorn" },
]

[package.metadata]
requires-dist = [
  { name = "fastapi", specifier = ">=0.111,<1.0" },
  { name = "openai", specifier = ">=2.7.2,<3.0" },
  { name = "openenv-core", specifier = ">=0.2.0" },
  { name = "pydantic", specifier = ">=2.7,<3.0" },
  { name = "uvicorn", specifier = ">=0.30,<1.0" },
]
